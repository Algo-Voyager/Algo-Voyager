    <clipPath id="dd-clip" clipPathUnits="userSpaceOnUse">
      <use href="#dd-path" transform="scale(0.125) translate(48 16)"/>
    </clipPath>
  </defs>

  <!-- Sparkles -->
  <g fill="#ffef6b" opacity="0.7">
    <circle cx="20" cy="40" r="1.2">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="28" r="1.4">
      <animate attributeName="opacity" values="0;1;0" dur="2.6s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="186" cy="54" r="1">
      <animate attributeName="opacity" values="0;1;0" dur="1.9s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="35" cy="18" r="1.1">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="1.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Coiled dragon, centered in the banner, slowly rotating. -->
  <g transform="translate(110 40)">
    <animateTransform attributeName="transform" type="rotate"
      values="0; 360" dur="20s" additive="sum" repeatCount="indefinite"/>

    <g transform="translate(-32 -32)">
      <use href="#dd-path" transform="scale(0.125) translate(48 16)" fill="url(#dd-grad)"/>
      <g clip-path="url(#dd-clip)">
        <rect x="0" y="0" width="72" height="72" fill="url(#dd-scales)"/>
      </g>
      <use href="#dd-path" transform="scale(0.125) translate(48 16)" fill="none"
           stroke="#0b1f0d" stroke-width="2" opacity="0.5"/>
    </g>
  </g>
</svg>
