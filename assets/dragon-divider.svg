<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 80" width="220" height="80" preserveAspectRatio="xMidYMid meet">
  <!-- Coiled dragon: Lorc, game-icons.net, CC BY 3.0.
       https://game-icons.net/1x1/lorc/dragon-spiral.html -->

  <defs>
    <linearGradient id="dd-grad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"  stop-color="#8bdc9a"/>
      <stop offset="45%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b3a1c"/>
    </linearGradient>
    <pattern id="dd-scales" patternUnits="userSpaceOnUse" width="6" height="5">
      <path d="M0 5 Q1.5 0 3 5 Q4.5 0 6 5" stroke="#0b1f0d" stroke-width="0.5" fill="none" opacity="0.55"/>
    </pattern>
