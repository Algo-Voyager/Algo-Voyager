<svg width="380" height="300" viewBox="0 0 380 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }

    .float { animation: float 5s ease-in-out infinite alternate; }
    @keyframes float { to { transform: translateY(-6px); } }

    .pulse { animation: pulse 4.5s ease-in-out infinite; }
    .p2 { animation-delay: 0.9s; }
    .p3 { animation-delay: 1.8s; }
    .p4 { animation-delay: 2.7s; }
    @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }

    .flow { stroke-dasharray: 5 130; animation: flow 6s linear infinite; }
    .fl2 { animation-delay: 2s; }
    .fl3 { animation-delay: 4s; }
    @keyframes flow { to { stroke-dashoffset: -135; } }

    .node-in { opacity: 0; animation: nodeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .n1 { animation-delay: 0.15s; } .n2 { animation-delay: 0.22s; }
    .n3 { animation-delay: 0.29s; } .n4 { animation-delay: 0.36s; }
    .n5 { animation-delay: 0.43s; } .n6 { animation-delay: 0.50s; }
    .n7 { animation-delay: 0.57s; } .n8 { animation-delay: 0.64s; }
    @keyframes nodeIn { to { opacity: 1; } }

    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; opacity: 1 !important; }
    }
  </style>

  <defs>
    <radialGradient id="cardGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0.5" y="0.5" width="379" height="299" rx="16" fill="#0d0d0f" stroke="#ffffff" stroke-opacity="0.08"/>
  <rect x="0.5" y="0.5" width="379" height="299" rx="16" fill="url(#cardGlow)"/>

  <text x="24" y="32" class="mono" font-size="10" letter-spacing="4" fill="#ffffff" fill-opacity="0.4">SYSTEM MAP</text>
  <circle cx="350" cy="28" r="3" fill="#22d3ee" class="pulse"/>

  <!-- connections -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="1">
    <line x1="190" y1="158" x2="75" y2="92"/>
    <line x1="190" y1="158" x2="160" y2="62"/>
    <line x1="190" y1="158" x2="290" y2="80"/>
    <line x1="190" y1="158" x2="330" y2="158"/>
    <line x1="190" y1="158" x2="300" y2="238"/>
    <line x1="190" y1="158" x2="190" y2="258"/>
    <line x1="190" y1="158" x2="84" y2="240"/>
    <line x1="190" y1="158" x2="48" y2="158"/>
  </g>
  <line x1="190" y1="158" x2="75" y2="92" class="flow" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1.2"/>
  <line x1="190" y1="158" x2="330" y2="158" class="flow fl2" stroke="#a78bfa" stroke-opacity="0.6" stroke-width="1.2"/>
  <line x1="190" y1="158" x2="84" y2="240" class="flow fl3" stroke="#22d3ee" stroke-opacity="0.6" stroke-width="1.2"/>

  <!-- center: floating isometric cube -->
  <g class="float">
    <polygon points="190,118 220,133 190,148 160,133" fill="#22d3ee" fill-opacity="0.32" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1"/>
    <polygon points="160,133 190,148 190,184 160,169" fill="#a78bfa" fill-opacity="0.22" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
    <polygon points="220,133 190,148 190,184 220,169" fill="#22d3ee" fill-opacity="0.12" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1"/>
  </g>
  <ellipse cx="190" cy="198" rx="32" ry="6" fill="#22d3ee" fill-opacity="0.08"/>

  <!-- nodes -->
  <g class="node-in n1">
    <circle cx="75" cy="92" r="3.5" fill="#22d3ee" class="pulse"/>
    <text x="75" y="76" text-anchor="middle" class="mono" font-size="10" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">JAVA</text>
  </g>
  <g class="node-in n2">
    <circle cx="160" cy="62" r="3.5" fill="#a78bfa" class="pulse p2"/>
    <text x="160" y="48" text-anchor="middle" class="mono" font-size="10" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">TYPESCRIPT</text>
  </g>
  <g class="node-in n3">
    <circle cx="290" cy="80" r="3.5" fill="#22d3ee" class="pulse p3"/>
    <text x="290" y="66" text-anchor="middle" class="mono" font-size="10" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">LANGCHAIN</text>
  </g>
  <g class="node-in n4">
    <circle cx="330" cy="158" r="3.5" fill="#a78bfa" class="pulse p4"/>
    <text x="330" y="143" text-anchor="middle" class="mono" font-size="10" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">DOCKER</text>
  </g>
  <g class="node-in n5">
    <circle cx="300" cy="238" r="3.5" fill="#22d3ee" class="pulse p2"/>
    <text x="300" y="258" text-anchor="middle" class="mono" font-size="10" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">AWS</text>
  </g>
  <g class="node-in n6">
    <circle cx="190" cy="258" r="3.5" fill="#a78bfa" class="pulse p3"/>
    <text x="190" y="278" text-anchor="middle" class="mono" font-size="10" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">REACT</text>
  </g>
  <g class="node-in n7">
    <circle cx="84" cy="240" r="3.5" fill="#22d3ee" class="pulse p4"/>
    <text x="84" y="260" text-anchor="middle" class="mono" font-size="10" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">PYTHON</text>
  </g>
  <g class="node-in n8">
    <circle cx="48" cy="158" r="3.5" fill="#a78bfa" class="pulse"/>
    <text x="48" y="143" text-anchor="middle" class="mono" font-size="10" letter-spacing="1.5" fill="#ffffff" fill-opacity="0.55">POSTGRES</text>
  </g>
</svg>
