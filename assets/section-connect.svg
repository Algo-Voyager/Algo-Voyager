<svg width="1000" height="70" viewBox="0 0 1000 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .sans { font-family: 'Segoe UI', Ubuntu, Helvetica, Arial, sans-serif; }
    .mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }
    .fade { opacity: 0; animation: fadeIn 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .f2 { animation-delay: 0.15s; }
    @keyframes fadeIn { to { opacity: 1; } }
    .rule { transform: scaleX(0); transform-origin: 110px 0; animation: grow 0.7s cubic-bezier(0.16, 1, 0.3, 1) 0.35s forwards; }
    @keyframes grow { to { transform: scaleX(1); } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; transform: none !important; opacity: 1 !important; } }
  </style>
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect x="0.5" y="0.5" width="999" height="69" rx="14" fill="#030303" stroke="#ffffff" stroke-opacity="0.07"/>
  <text x="34" y="51" class="mono fade" font-size="42" font-weight="700" fill="#ffffff" fill-opacity="0.1">04</text>
  <text x="110" y="43" class="sans fade f2" font-size="17" font-weight="700" letter-spacing="7" fill="url(#accent)">CONNECT</text>
  <rect x="110" y="51" width="46" height="2" rx="1" fill="url(#accent)" class="rule"/>
  <text x="964" y="41" text-anchor="end" class="mono fade f2" font-size="10" letter-spacing="3" fill="#ffffff" fill-opacity="0.3">ACT IV · THE INVITATION</text>
</svg>
