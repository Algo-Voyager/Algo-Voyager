<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="160" height="100" preserveAspectRatio="xMidYMid meet">
  <!-- Spiked dragon head: Delapouite, game-icons.net, CC BY 3.0.
       https://game-icons.net/1x1/delapouite/spiked-dragon-head.html -->

  <defs>
    <linearGradient id="dp-grad" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"  stop-color="#8bdc9a"/>
      <stop offset="45%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b3a1c"/>
    </linearGradient>
    <pattern id="dp-scales" patternUnits="userSpaceOnUse" width="6" height="5">
      <path d="M0 5 Q1.5 0 3 5 Q4.5 0 6 5" stroke="#0b1f0d" stroke-width="0.5" fill="none" opacity="0.55"/>
    </pattern>
    <radialGradient id="dp-fire" cx="25%" cy="50%" r="75%">
      <stop offset="0%"   stop-color="#fff59d" stop-opacity="1"/>
      <stop offset="45%"  stop-color="#ff8a1f" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff2a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="dp-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>
    <path id="dp-path" d="M188.8 20.38c-5.3 26.85 4.6 55.74 34.1 86.52 11.2-7.29 31.6-10.94 50-8.16-46-22.31-66.5-47.13-84.1-78.36zM29.19 26.62C43.56 73.08 81.09 128.8 129.6 168.3 93.51 166 49.93 153.1 18.76 143c24.96 35.2 64.17 52.9 103.34 66.3C97.13 227 66.99 245 18.66 248c54.64 19.2 107.54 8.9 131.34.7-17.9 34.9-100.72 66.2-122.31 77 53.26 4.2 121.71-11 167.01-32.9 10 24.6-1.6 53.2-10.1 77.8-1.9 4.5-3.8 8.9-5.7 13.3 5.1-3.5 10.1-7 14.9-10.6 23.6-16.2 47.8-31.9 59.5-58.8 26.1 31.2 62.7 62.1 107 85.4 17.4 22.1 28.3 49 34.2 73.8 8.3-19.1 13.8-40.2 9.7-60.3 24.5-3.6 35.6-29.7 35.5-54.4-12.6 6.2-15.1 6.3-31.2 8.2 0-10.1.6-12.5-3-28.7-10.3 8.4-21 11.2-30.8 11.8 2.1-7.6 3-19.5 3.7-27.3-13 7.1-19.2 9.7-30.1 10.8-.4-10.9-.1-20-4.1-30.4-29.6 19-48.6 1.5-68-21.3 19.8-17 96.4-21.8 95.1 7.1 14-7.3 18.8-11.2 23.6-15.9 9.1 8.5 13.4 20.9 15.1 31.4 9.3-9.4 10.3-10.5 17.1-23.8 5.7 10.1 8.8 17 10.7 30.6 8.5-6.2 15.4-13.1 19.8-21.4 7.5 15.5 8.3 16 12.4 33 17.8-13.1 21.8-31.2 22.8-47.6 2-33-.3-108.2-31-142.9 1.7 36.3-13.1 70-33.8 80.7-12.6 4.9-96.5-74.6-137.6-93.3-23.5-10.2-48.1 7.1-67.8 9.3C147 106.2 83.57 70.94 29.19 26.62zM296.1 152.8c13.3 20.9 32.2 36.9 60.1 55-19.4 2.9-65.8-6.7-77.7-24-5.5-7.9 7.1-21.3 17.6-31zM180.6 319.1c-14.4 6.2-29.2 10.9-43.8 14.3-2.4 3.6-4.6 7.1-6.7 10.5 14.8 5.3 31.5 7 44.1 2.8 3.3-9.8 5.5-19.3 6.4-27.6zm-68 19.1l-10.2 1.5c-31.81 36.6-61.9 103.2-48.24 151.9h36.13c-11.12-37.7-16.53-87.1 22.31-153.4zm8.5 21.5c-5.9 11.4-10.4 22.1-13.8 32.1 12.9 6.7 29.1 8.9 44.8 8.2 4.6-10.5 9.8-21.8 14.6-33.3-15.4 1.8-31.4-1.4-45.6-7zm111.4 6.6c-12 10.5-25.2 20.3-38.9 29.6 7 34 33.4 63.4 73.9 95.7h83.3c-57.2-31.8-94.6-73.3-118.3-125.3zm-130 43.2c-2.5 11.8-3.3 22.7-3 32.9 37.3 14.2 62.5 13.5 97.5 4.1-7.2-10.3-13-21-16.9-32.3-32.7 9.4-55.4 5.7-77.6-4.7zm106.6 52.4c-38.1 10.9-68.8 13.2-107.5.3 1.8 10.4 4.5 20.1 7.5 29.4h130.1c-11.3-9.8-21.4-19.6-30.1-29.7z"/>
    <clipPath id="dp-clip" clipPathUnits="userSpaceOnUse">
      <use href="#dp-path" transform="scale(0.22)"/>
    </clipPath>
  </defs>

  <!-- Gentle head-bob -->
  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,-3; 0,0"
      dur="2.4s" repeatCount="indefinite"/>

    <!-- Dragon head, colorized -->
    <g transform="translate(4 2)">
      <use href="#dp-path" transform="scale(0.22)" fill="url(#dp-grad)"/>
      <g clip-path="url(#dp-clip)">
        <rect x="0" y="0" width="120" height="120" fill="url(#dp-scales)"/>
      </g>
      <use href="#dp-path" transform="scale(0.22)" fill="none"
           stroke="#0b1f0d" stroke-width="2" opacity="0.55"/>
      <!-- eye glow -->
      <circle cx="92" cy="32" r="1.8" fill="#ffef6b">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Fire breath (puffs from the snout) -->
    <g>
      <ellipse cx="118" cy="42" rx="10" ry="4" fill="url(#dp-fire)" filter="url(#dp-blur)">
        <animate attributeName="rx" values="0; 14; 22" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0; 1; 0" dur="0.9s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="116; 134; 152" dur="0.9s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="118" cy="42" rx="6" ry="3" fill="url(#dp-fire)" filter="url(#dp-blur)">
        <animate attributeName="rx" values="0; 9; 14" dur="0.9s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0; 1; 0" dur="0.9s" begin="0.3s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="116; 128; 145" dur="0.9s" begin="0.3s" repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>
</svg>
