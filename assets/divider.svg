<svg width="240" height="40" viewBox="0 0 240 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .breathe { animation: breathe 4s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; opacity: 1 !important; } }
  </style>
  <defs>
    <linearGradient id="fadeL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="fadeR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="22" y="19.5" width="84" height="1" fill="url(#fadeL)"/>
  <rect x="134" y="19.5" width="84" height="1" fill="url(#fadeR)"/>
  <rect x="116" y="16" width="8" height="8" rx="1.5" transform="rotate(45 120 20)" fill="none" stroke="#22d3ee" stroke-opacity="0.7" stroke-width="1.2" class="breathe"/>
</svg>
